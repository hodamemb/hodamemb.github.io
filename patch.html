<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>와펜작업 및 부착 | 호담EMB</title>
<style>
body{margin:0;font-family:sans-serif;background:#f5f1ea;color:#111}
.container{max-width:1200px;margin:auto;padding:30px 20px}
.back{text-decoration:none;color:#111;font-weight:700}
h1{margin:30px 0}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.gallery img{width:100%;height:240px;object-fit:cover;border-radius:18px;cursor:pointer}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);align-items:center;justify-content:center;z-index:999}
.lightbox img{max-width:92%;max-height:90%;border-radius:12px}
.lightbox:target{display:flex}
</style>
</head>

<body>
<div class="container">
  <a class="back" href="index.html">← 메인으로</a>
  <h1>와펜작업 및 부착</h1>

  <div class="gallery" id="gallery"></div>
</div>

<script>
  const folder = "이미지/패치/";
  const totalImages = 8;

  const gallery = document.getElementById("gallery");

  for (let i = 1; i <= totalImages; i++) {
    const number = String(i).padStart(2, "0");
    gallery.innerHTML += `
      <a href="#img${i}">
        <img src="${folder}${number}.jpg" alt="와펜 작업 ${i}">
      </a>

      <a href="#" class="lightbox" id="img${i}">
        <img src="${folder}${number}.jpg" alt="와펜 작업 ${i}">
      </a>
    `;
  }
</script>
</body>
</html>
