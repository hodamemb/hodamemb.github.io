<style>
body{margin:0;font-family:sans-serif;background:#f5f1ea;color:#111}
.container{max-width:1200px;margin:auto;padding:30px 20px}
.back{text-decoration:none;color:#111;font-weight:700}
h1{margin:30px 0}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:18px;
}

.gallery img{
  width:100%;
  height:260px;
  object-fit:cover;
  border-radius:18px;
  cursor:pointer;
  background:#eee;
}

.viewer{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.88);
  z-index:999;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

.viewer img{
  max-width:92%;
  max-height:82%;
  border-radius:14px;
}

.viewer:target{display:flex}

.close{
  position:fixed;
  top:22px;
  right:28px;
  color:#fff;
  font-size:34px;
  text-decoration:none;
  font-weight:700;
}

.nav{
  margin-top:18px;
}

.nav a{
  color:#fff;
  text-decoration:none;
  font-size:20px;
  margin:0 20px;
  font-weight:700;
}
</style>
</head>
